name: Pipeline diario Dashboard Macro

on:
  # Corre todos los días a las 22:00 UTC (19:00 hora Argentina)
  # Cierre de mercados EEUU y actualización de datos del día
  schedule:
    - cron: '0 22 * * *'
  # Permite disparar manualmente desde GitHub
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ejecutar pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GCLOUD_SERVICE_ACCOUNT: ${{ secrets.GCLOUD_SERVICE_ACCOUNT }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          CHILE_USER: ${{ secrets.CHILE_USER }}
          CHILE_PASS: ${{ secrets.CHILE_PASS }}
          SHEET_NAME: ${{ secrets.SHEET_NAME }}
        run: python pipeline_v2.py
