name: Pipeline diario

on:
  schedule:
    - cron: '0 11 * * 1-5'
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: ''

      - name: Instalar dependencias
        run: pip install --no-cache-dir yfinance requests gspread google-auth pandas

      - name: Verificar contenido del archivo
        run: head -10 pipeline_actions.py

      - name: Crear credenciales
        run: echo '${{ secrets.GCLOUD_SERVICE_ACCOUNT }}' > credentials.json

      - name: Correr pipeline
        run: python pipeline_actions.py
        env:
          SHEET_NAME: ${{ secrets.SHEET_NAME }}
